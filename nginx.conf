server {
  listen 80;
  server_tokens off;

  root /usr/share/nginx/html;
  index index.html index.htm;

  # Compression — smaller payloads, faster TTFB for text assets
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 5;
  gzip_min_length 256;
  gzip_types
    text/plain
    text/css
    text/xml
    application/json
    application/javascript
    application/xml
    application/xml+rss
    image/svg+xml;

  # File cache — avoid repeated disk reads
  open_file_cache max=1000 inactive=20s;
  open_file_cache_valid 30s;
  open_file_cache_min_uses 2;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;

  # Security headers
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://wa.me; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

  # Immutable hashed Astro assets (expires only — inherits security headers above)
  location /_astro/ {
    expires 1y;
    access_log off;
  }

  # Static images & fonts
  location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|woff2?)$ {
    expires 30d;
    access_log off;
  }

  # Astro static build emits directory-style pages (e.g. /privacy/index.html),
  # so try the exact file, the directory index, then the .html variant.
  location / {
    expires 1h;
    try_files $uri $uri/ $uri.html /index.html;
  }
}